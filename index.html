<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakaloCash Pro | Madagascar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #2ebd85; 
            --red: #f6465d; --text: #eaecef; --gray: #848e9c; --border: #2b3139;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); 
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; width: 100%; box-sizing: border-box; }

        /* HEADER & MENU */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .brand { font-size: 26px; font-weight: 800; color: var(--yellow); letter-spacing: -1px; }
        .nav-icons { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 22px; cursor: pointer; color: var(--gray); transition: 0.3s; }
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--yellow); cursor: pointer; }

        /* SIDEBAR */
        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--card); 
            z-index: 9999; transition: 0.4s; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); 
        }
        .sidebar.active { right: 0; }
        .sidebar-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
            display: none; z-index: 9998; 
        }

        /* BALANCE */
        .balance-card { text-align: center; padding: 40px 0; }
        .balance-label { color: var(--gray); font-size: 14px; margin-bottom: 8px; }
        .balance-value { font-size: 42px; font-weight: 800; color: white; }

        /* QUICK ACTIONS */
        .actions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .btn-act { 
            border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; 
        }
        .btn-y { background: var(--yellow); color: #000; }
        .btn-g { background: var(--green); color: #fff; }

        /* TABS NAVIGATION */
        .history-tabs { 
            display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px;
            scrollbar-width: none;
        }
        .tab-item { 
            background: transparent; border: none; color: var(--gray); padding: 8px 15px; 
            font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border-radius: 20px;
        }
        .tab-item.active { background: var(--border); color: var(--yellow); }

        /* LIST ITEM */
        .trans-item { 
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent;
        }
        .t-in { border-left-color: var(--green); }
        .t-out { border-left-color: var(--red); }
        .t-info b { display: block; font-size: 15px; margin-bottom: 4px; }
        .t-info small { color: var(--gray); font-size: 11px; }
        .t-amount { text-align: right; }
        .t-val { font-weight: 700; font-size: 15px; display: block; }
        .status-pill { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        
        /* FOOTER */
        footer { 
            margin-top: auto; padding: 30px 20px; text-align: center; border-top: 1px solid var(--border);
            color: var(--gray); font-size: 12px;
        }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: var(--card); width: 100%; max-width: 380px; padding: 25px; border-radius: 24px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 20px; color: var(--gray); cursor: pointer; }
        .input-box { width: 100%; background: #12151c; border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; margin: 10px 0; box-sizing: border-box; }

        .toast { 
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000;
            padding: 12px 25px; border-radius: 10px; font-weight: 700; display: none; z-index: 11000;
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="margin:0;">Menu</h2>
        <i class="fa-solid fa-xmark" onclick="toggleSidebar()" style="font-size:24px; cursor:pointer;"></i>
    </div>
    <div style="display:flex; flex-direction:column; gap:20px;">
        <div onclick="showFullHistory()" style="cursor:pointer; font-weight:600;"><i class="fa-solid fa-clock-rotate-left"></i> Historique Complet</div>
        <div onclick="notify('Mbola eo am-panamboarana...')" style="cursor:pointer; font-weight:600;"><i class="fa-solid fa-user-gear"></i> Paramètres Account</div>
        <div onclick="logout()" style="cursor:pointer; font-weight:600; color:var(--red);"><i class="fa-solid fa-right-from-bracket"></i> Se Déconnecter</div>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <header>
        <div class="brand">TakaloCash</div>
        <div class="nav-icons">
            <i class="fa-solid fa-bars-staggered menu-btn" onclick="toggleSidebar()"></i>
            <img src="https://i.pravatar.cc/100?u=myid" class="profile-pic" onclick="toggleSidebar()">
        </div>
    </header>

    <section class="balance-card">
        <div class="balance-label">Total Balance (MGA)</div>
        <div class="balance-value" id="user-solde">0 Ar</div>
    </section>

    <div class="actions-row">
        <button class="btn-act btn-y" onclick="openModal('modal-envoyer')"><i class="fa-solid fa-arrow-up"></i> Envoyer</button>
        <button class="btn-act btn-g" onclick="openModal('modal-recevoir')"><i class="fa-solid fa-arrow-down"></i> Recevoir</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0; font-size:16px;">Activités récentes</h3>
        <span onclick="showFullHistory()" style="font-size:12px; color:var(--yellow); cursor:pointer;">Voir tout</span>
    </div>

    <div class="history-tabs">
        <button class="tab-item active" onclick="filterHistory('all', this)">Tous</button>
        <button class="tab-item" onclick="filterHistory('envoyer', this)">Envoyer</button>
        <button class="tab-item" onclick="filterHistory('recevoir', this)">Recevoir</button>
        <button class="tab-item" onclick="filterHistory('dépôt', this)">Dépôt</button>
        <button class="tab-item" onclick="filterHistory('retrait', this)">Retrait</button>
    </div>

    <div id="history-list">
        </div>

    <footer>
        <div style="font-weight:700; margin-bottom:5px;">TakaloCash Madagascar</div>
        <div>&copy; 2026 Secured Exchange System</div>
    </footer>
</div>

<div id="modal-envoyer" class="modal">
    <div class="modal-body">
        <span class="close-modal" onclick="closeModal('modal-envoyer')">&times;</span>
        <h3 style="margin-top:0;">Vendre Crypto</h3>
        <select id="env-type" class="input-box"><option value="TRX">TRX</option><option value="USDT">USDT</option></select>
        <input type="number" id="env-amount" class="input-box" placeholder="Montant en Ar">
        <input type="text" id="env-adr" class="input-box" placeholder="Adresse destinataire">
        <button class="btn-act btn-y" style="width:100%; margin-top:10px;" onclick="handleEnvoyer()">Confirmer</button>
    </div>
</div>

<div id="modal-recevoir" class="modal">
    <div class="modal-body">
        <span class="close-modal" onclick="closeModal('modal-recevoir')">&times;</span>
        <h3 style="margin-top:0;">Acheter Crypto</h3>
        <select id="rec-type" class="input-box"><option value="USDT">USDT</option><option value="TRX">TRX</option></select>
        <input type="number" id="rec-qty" class="input-box" placeholder="Quantité (Crypto)">
        <button class="btn-act btn-g" style="width:100%; margin-top:10px;" onclick="handleRecevoir()">Générer l'adresse</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const supabaseClient = supabase.createClient("https://nyeopreahmajoisartoz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55ZW9wcmVhaG1ham9pc2FydG96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjgzMDgsImV4cCI6MjA5MDE0NDMwOH0.2ASTgZPKssdhGnFGcjit7BZOdEFOnFqIHkmt8w239EA");

let currentUserId = null;
let allTransactions = [];
let showAll = false;

function notify(m){ const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.sidebar-overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }
function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

async function checkUser(){
    const {data:{user}} = await supabaseClient.auth.getUser();
    if(user){ currentUserId=user.id; document.getElementById('app').style.display='block'; refreshData(); }
    else { window.location.href = "login.html"; } // Hanova pejy raha tsy logué
}

async function refreshData(){
    const {data:u} = await supabaseClient.from('users').select('solde').eq('id', currentUserId).single();
    if(u) document.getElementById('user-solde').innerText = u.solde.toLocaleString() + " Ar";
    
    const {data:ts} = await supabaseClient.from('transactions').select('*').eq('user_id', currentUserId).order('created_at', {ascending:false});
    allTransactions = ts || [];
    renderHistory('all');
}

function renderHistory(filter = 'all'){
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    let filtered = allTransactions;
    if(filter !== 'all') {
        filtered = allTransactions.filter(t => t.service.toLowerCase().includes(filter));
    }

    // Limit to 3 if showAll is false
    const toDisplay = showAll ? filtered : filtered.slice(0, 3);

    if(toDisplay.length === 0) list.innerHTML = "<p style='text-align:center; color:var(--gray); font-size:13px;'>Aucune transaction trouvée.</p>";

    toDisplay.forEach(t => {
        const isPos = t.service.toLowerCase().includes('recevoir') || t.service.toLowerCase().includes('dépôt');
        const statusColor = t.status === 'Confirmé' ? 'var(--green)' : (t.status === 'Annulé' ? var(--red) : var(--yellow));
        
        list.innerHTML += `
            <div class="trans-item ${isPos ? 't-in' : 't-out'}">
                <div class="t-info">
                    <b>${t.service}</b>
                    <small>${new Date(t.created_at).toLocaleString('fr-MG', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</small>
                </div>
                <div class="t-amount">
                    <span class="t-val" style="color:${isPos ? 'var(--green)' : 'var(--red)'}">${isPos?'+':'-'} ${t.montant.toLocaleString()} Ar</span>
                    <span class="status-pill" style="background:${statusColor}22; color:${statusColor}">${t.status}</span>
                </div>
            </div>
        `;
    });
}

function filterHistory(type, btn){
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderHistory(type);
}

function showFullHistory(){
    showAll = true;
    renderHistory('all');
    toggleSidebar();
    window.scrollTo({top: 500, behavior: 'smooth'});
}

// Hanampy ny lojika amin'ny Envoyer/Recevoir (mitovy amin'ny teo aloha)
async function handleEnvoyer(){ /* Code teo aloha */ }
async function handleRecevoir(){ /* Code teo aloha */ }

function logout(){ supabaseClient.auth.signOut().then(()=>location.reload()); }

checkUser();
</script>
</body>
</html>
