<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakaloCash Pro - Madagascar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        :root {
            --bg-dark: #0b0e11;
            --card-bg: #1e2329;
            --text-gray: #848e9c;
            --yellow: #fcd535;
            --green: #2ebd85;
            --border: rgba(255, 255, 255, 0.05);
            --yellow-grad: linear-gradient(90deg, #fcd535, #f0b90b);
        }

        body {
            margin: 0; background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif; color: white;
            padding-bottom: 100px;
        }

        .container { max-width: 420px; margin: auto; padding: 15px; display: none; } /* Afenina raha tsy loggé */

        /* AUTH CONTAINER */
        #auth-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: var(--card-bg); width: 100%; max-width: 350px;
            padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center;
        }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; color: var(--text-gray); border-bottom: 2px solid transparent; }
        .auth-tab.active { color: var(--yellow); border-bottom: 2px solid var(--yellow); font-weight: bold; }

        /* INPUTS & BUTTONS */
        .input-styled {
            background: #12151c; border: 1px solid var(--border); border-radius: 12px;
            padding: 14px; color: white; width: 100%; margin-bottom: 15px; box-sizing: border-box; outline: none;
        }
        .btn-valider {
            width: 100%; background: var(--yellow-grad); border: none; padding: 16px;
            border-radius: 12px; font-weight: 700; cursor: pointer; color: black;
        }
        .btn-valider:disabled { opacity: 0.6; }

        /* DASHBOARD ELEMENTS */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .logo { font-weight: 800; font-size: 20px; }
        .logo span { color: #3ea1f0; }
        .profile-area { display: flex; align-items: center; gap: 10px; }
        .profile-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--yellow); }

        .solde-card { text-align: center; padding: 30px 0; }
        .solde-card h1 { font-size: 36px; margin: 10px 0; font-weight: 700; }

        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .s-box { background: var(--card-bg); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); }
        .s-icon { color: var(--yellow); font-size: 18px; }

        .form-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
        
        /* SPINNER */
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid black; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }

        /* TOAST */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1b1f28; padding: 12px 25px; border-radius: 30px; border: 1px solid var(--yellow); transition: 0.5s; opacity: 0; z-index: 3000; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); text-decoration: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <h2 style="color:var(--yellow);">TakaloCash</h2>
        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active" onclick="switchAuth('login')">Connexion</div>
            <div id="tab-signup" class="auth-tab" onclick="switchAuth('signup')">Inscription</div>
        </div>
        <input type="email" id="auth-email" class="input-styled" placeholder="Email">
        <input type="password" id="auth-password" class="input-styled" placeholder="Mot de passe">
        <button class="btn-valider" id="btn-auth" onclick="handleAuth()">
            <span id="auth-text">Se connecter</span>
        </button>
    </div>
</div>

<div class="container" id="main-container">
    <div class="header">
        <div class="logo"><span>TC</span> TakaloCash</div>
        <div class="profile-area">
            <i class="fa-solid fa-bell"></i>
            <img src="https://i.pravatar.cc/100" class="profile-img" onclick="logout()" title="Déconnexion">
        </div>
    </div>

    <div class="solde-card">
        <p style="color:var(--text-gray)">Solde disponible</p>
        <h1 id="solde-display">0 Ar</h1>
    </div>

    <div class="services">
        <div class="s-box"><i class="fa-brands fa-bitcoin s-icon"></i><div><h4 style="margin:0">Crypto</h4><p style="margin:0;font-size:10px;color:var(--text-gray)">TRX, USDT</p></div></div>
        <div class="s-box"><i class="fa-solid fa-gamepad s-icon" style="color:#3ea1f0"></i><div><h4 style="margin:0">1xBet</h4><p style="margin:0;font-size:10px;color:var(--text-gray)">Dépôt/Retrait</p></div></div>
    </div>

    <div class="form-card">
        <h3 style="margin-top:0; color:var(--yellow)">Envoyer Crypto</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="crypto-select" class="input-styled" style="flex:1; margin-bottom:0;" onchange="updateCalcul()">
                <option value="TRX">🪙 TRX</option>
                <option value="USDT">💵 USDT</option>
                <option value="BTC">₿ BTC</option>
            </select>
            <input type="number" id="ariary" class="input-styled" style="flex:1.5; margin-bottom:0;" placeholder="Montant Ar" oninput="updateCalcul()">
        </div>
        <input type="text" id="adresse" class="input-styled" placeholder="Adresse destinataire">
        
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:20px;">
            <span style="color:var(--text-gray)">Equivalent crypto:</span>
            <span style="font-weight:bold; color:var(--yellow)"><span id="crypto-val">0.00</span> <span id="crypto-label">TRX</span></span>
        </div>

        <button class="btn-valider" id="btn-envoyer" onclick="envoyer()">
            <span class="btn-text">Valider Envoi</span>
            <div class="spinner"></div>
        </button>
    </div>
</div>

<a href="https://wa.me/261340000000" class="fab"><i class="fa-solid fa-comment-dots"></i></a>
<div id="toast" class="toast"></div>

<script>
// --- CONFIG SUPABASE ---
const supabaseClient = supabase.createClient(
    "https://nyeopreahmajoisartoz.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55ZW9wcmVhaG1ham9pc2FydG96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjgzMDgsImV4cCI6MjA5MDE0NDMwOH0.2ASTgZPKssdhGnFGcjit7BZOdEFOnFqIHkmt8w239EA"
);

let currentMode = 'login';
let currentUserId = null;
const TAUX = { "TRX": 150, "USDT": 4600, "BTC": 300000000 };

// --- NOTIFICATION ---
function notify(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
}

// --- AUTH LOGIC ---
function switchAuth(mode) {
    currentMode = mode;
    document.getElementById('tab-login').classList.toggle('active', mode === 'login');
    document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
    document.getElementById('auth-text').innerText = (mode === 'login') ? 'Se connecter' : "S'inscrire";
}

async function handleAuth() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return notify("Fenoy ny banga! ⚠️");

    if (currentMode === 'signup') {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) return notify(error.message);
        // Automatique: mampiditra solde 0 Ar ao amin'ny tabilao 'users'
        await supabaseClient.from('users').insert([{ id: data.user.id, solde: 0 }]);
        notify("Kaonty voatomboka! ✅");
    } else {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) return notify("Email na teny miafina diso! ❌");
    }
    checkUser();
}

async function checkUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
        currentUserId = user.id;
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        fetchUserData();
    } else {
        document.getElementById('auth-container').style.display = 'flex';
        document.getElementById('main-container').style.display = 'none';
    }
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

// --- DASHBOARD LOGIC ---
async function fetchUserData() {
    const { data } = await supabaseClient.from('users').select('solde').eq('id', currentUserId).single();
    if (data) document.getElementById('solde-display').innerText = data.solde.toLocaleString() + " Ar";
}

function updateCalcul() {
    const crypto = document.getElementById("crypto-select").value;
    const ar = parseFloat(document.getElementById("ariary").value) || 0;
    const result = ar / TAUX[crypto];
    document.getElementById("crypto-val").innerText = (crypto === "BTC" ? result.toFixed(8) : result.toFixed(2));
    document.getElementById("crypto-label").innerText = crypto;
}

async function envoyer() {
    const ar = document.getElementById("ariary").value;
    const adr = document.getElementById("adresse").value;
    const crypto = document.getElementById("crypto-select").value;
    if(!ar || !adr) return notify("Fenoy ny banga! ⚠️");

    const btn = document.getElementById("btn-envoyer");
    btn.classList.add("loading");

    const { error } = await supabaseClient.from('transactions').insert([{
        user_id: currentUserId, montant: ar, adresse: adr, service: "Crypto ("+crypto+")", status: "En attente"
    }]);

    setTimeout(() => {
        btn.classList.remove("loading");
        if(!error) notify("Fangatahana voaray! ✅");
        else notify("Nisy olana kely... ❌");
    }, 1500);
}

// INIT
checkUser();
</script>
</body>
</html>
