<!DOCTYPE html>
<html lang="mg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TakaloCash Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
--bg:#0d1117;
--card:#161b22;
--yellow:#fcd535;
--green:#2ebd85;
--red:#ff4d4d;
--gray:#848e9c;
--border:rgba(255,255,255,0.1);
}

body{
margin:0;
background:var(--bg);
font-family:'Inter';
color:white;
}

/* HEADER */
.title-gradient{
background:linear-gradient(90deg,#fcd535,#2ebd85);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:800;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:15px;
display:none;
}

/* SOLDE */
.solde-section{
background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
padding:20px;
border-radius:15px;
border:1px solid var(--border);
text-align:center;
margin-bottom:15px;
}

.solde-amount{
font-size:32px;
font-weight:700;
}

/* BUTTONS */
.action-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.btn-main{
padding:14px;
border-radius:12px;
font-weight:700;
border:none;
cursor:pointer;
}

.btn-env{background:var(--yellow);}
.btn-rec{background:var(--green);color:white;}

/* SERVICES */
.service-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.service-card{
background:#1c2128;
border:1px solid var(--border);
border-radius:12px;
padding:12px;
display:flex;
gap:10px;
align-items:center;
}

.service-card i{color:var(--yellow);}

/* FOOTER */
.footer{
margin-top:25px;
padding-top:15px;
border-top:1px solid var(--border);
font-size:12px;
color:var(--gray);
}

/* INPUT */
.input-styled{
background:#12151c;
border:1px solid var(--border);
border-radius:10px;
padding:12px;
color:white;
width:100%;
margin-bottom:10px;
}

.btn-valider{
width:100%;
background:var(--yellow);
padding:14px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

/* AUTH */
#auth-container{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
}

.auth-card{
background:var(--card);
padding:25px;
border-radius:15px;
width:90%;
max-width:300px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-container">
<div class="auth-card">
<h2 class="title-gradient">TakaloCash</h2>
<input id="auth-email" class="input-styled" placeholder="Email">
<input id="auth-password" class="input-styled" placeholder="Mot de passe">
<button class="btn-valider" onclick="handleAuth()">Connexion</button>
</div>
</div>

<!-- APP -->
<div class="container" id="main-app">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;">
<div class="title-gradient">TakaloCash</div>
<i class="fa fa-bars"></i>
</div>

<!-- SOLDE -->
<div class="solde-section">
<div style="color:var(--gray)">Solde disponible</div>
<div class="solde-amount" id="display-solde">0 Ar</div>
</div>

<!-- ACTION -->
<div class="action-grid">
<button class="btn-main btn-env">Envoyer</button>
<button class="btn-main btn-rec">Recevoir</button>
</div>

<!-- SERVICES -->
<div class="service-grid">

<div class="service-card">
<i class="fa-brands fa-bitcoin"></i>
<div>Crypto</div>
</div>

<div class="service-card">
<i class="fa-solid fa-wallet"></i>
<div>Porte-feuille</div>
</div>

<div class="service-card">
<i class="fa-solid fa-dice"></i>
<div>1xBet</div>
</div>

<div class="service-card">
<i class="fa-solid fa-satellite"></i>
<div>Starlink</div>
</div>

<div class="service-card">
<i class="fa-brands fa-facebook"></i>
<div>Boost Facebook</div>
</div>

</div>

<!-- FORM -->
<div style="background:var(--card);padding:15px;border-radius:15px;">
<h3 style="color:var(--yellow)">Envoyer Crypto</h3>

<select id="env-crypto" class="input-styled">
<option>TRX</option>
<option>USDT</option>
</select>

<input id="env-ariary" class="input-styled" placeholder="Montant Ar">
<input id="env-adr" class="input-styled" placeholder="Adresse">

<button class="btn-valider">Valider</button>
</div>

<!-- FOOTER -->
<div class="footer">
<div>Conditions d'utilisation</div>
<div>Politique de confidentialité</div>
<div>Chat & Aide</div>
<div>Contact: WhatsApp / Email</div>
</div>

</div>

<script>
// SUPABASE (TSY OVANA)
const supabaseClient = supabase.createClient(
"https://nyeopreahmajoisartoz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function handleAuth(){
document.getElementById('auth-container').style.display='none';
document.getElementById('main-app').style.display='block';
}
</script>

</body>
</html>
