<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakaloCash | Madagascar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #2ebd85; 
            --red: #f6465d; --text: #eaecef; --gray: #848e9c; --border: #2b3139;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); 
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; width: 100%; box-sizing: border-box; display: block; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .brand { font-size: 26px; font-weight: 800; color: var(--yellow); letter-spacing: -1px; }
        .nav-icons { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 22px; cursor: pointer; color: var(--gray); }
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--yellow); cursor: pointer; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: var(--card); z-index: 9999; transition: 0.4s; padding: 30px; }
        .sidebar.active { right: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 9998; }

        /* BALANCE */
        .balance-card { text-align: center; padding: 30px 0; }
        .balance-label { color: var(--gray); font-size: 14px; margin-bottom: 8px; }
        .balance-value { font-size: 36px; font-weight: 800; color: white; }

        /* ACTIONS */
        .actions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .btn-act { border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-y { background: var(--yellow); color: #000; }
        .btn-g { background: var(--green); color: #fff; }

        /* TABS */
        .history-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .tab-item { background: transparent; border: none; color: var(--gray); padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 20px; white-space: nowrap; }
        .tab-item.active { background: var(--border); color: var(--yellow); }

        /* LIST */
        .trans-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .t-info b { display: block; font-size: 14px; }
        .t-info small { color: var(--gray); font-size: 11px; }
        .t-amount { text-align: right; }
        .status-pill { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; }

        footer { margin-top: auto; padding: 20px; text-align: center; color: var(--gray); font-size: 11px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: var(--card); width: 100%; max-width: 350px; padding: 25px; border-radius: 20px; }
        .input-box { width: 100%; background: #12151c; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h3>Menu</h3>
        <i class="fa-solid fa-xmark" onclick="toggleSidebar()"></i>
    </div>
    <div style="display:flex; flex-direction:column; gap:20px;">
        <div onclick="showFullHistory()" style="cursor:pointer;"><i class="fa-solid fa-clock"></i> Historique Complet</div>
        <div onclick="logout()" style="cursor:pointer; color:var(--red);"><i class="fa-solid fa-power-off"></i> Déconnexion</div>
    </div>
</div>

<div class="container" id="app">
    <header>
        <div class="brand">TakaloCash</div>
        <div class="nav-icons">
            <i class="fa-solid fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <img src="https://i.pravatar.cc/100?u=1" class="profile-pic">
        </div>
    </header>

    <div class="balance-card">
        <div class="balance-label">Solde disponible</div>
        <div class="balance-value" id="user-solde">0 Ar</div>
    </div>

    <div class="actions-row">
        <button class="btn-act btn-y" onclick="openModal('modal-envoyer')">Envoyer</button>
        <button class="btn-act btn-g" onclick="openModal('modal-recevoir')">Recevoir</button>
    </div>

    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3 style="font-size:15px; margin:0;">Activités</h3>
        <span onclick="showFullHistory()" style="font-size:12px; color:var(--yellow); cursor:pointer;">Voir tout</span>
    </div>

    <div class="history-tabs">
        <button class="tab-item active" onclick="filterHistory('all', this)">Tous</button>
        <button class="tab-item" onclick="filterHistory('envoyer', this)">Envoyer</button>
        <button class="tab-item" onclick="filterHistory('recevoir', this)">Recevoir</button>
        <button class="tab-item" onclick="filterHistory('dépôt', this)">Dépôt</button>
        <button class="tab-item" onclick="filterHistory('retrait', this)">Retrait</button>
    </div>

    <div id="history-list"></div>

    <footer>&copy; 2026 TakaloCash Madagascar</footer>
</div>

<div id="modal-envoyer" class="modal">
    <div class="modal-body">
        <h3>Vendre Crypto</h3>
        <input type="number" id="env-amount" class="input-box" placeholder="Montant Ar">
        <button class="btn-act btn-y" style="width:100%" onclick="closeModal('modal-envoyer')">Valider</button>
    </div>
</div>

<div id="modal-recevoir" class="modal">
    <div class="modal-body">
        <h3>Acheter Crypto</h3>
        <input type="number" id="rec-qty" class="input-box" placeholder="Quantité">
        <button class="btn-act btn-g" style="width:100%" onclick="closeModal('modal-recevoir')">Continuer</button>
    </div>
</div>

<script>
// === AMPIDIRO ETO NY CREDENTIALS-NAO ===
const supabaseUrl = "https://nyeopreahmajoisartoz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55ZW9wcmVhaG1ham9pc2FydG96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjgzMDgsImV4cCI6MjA5MDE0NDMwOH0.2ASTgZPKssdhGnFGcjit7BZOdEFOnFqIHkmt8w239EA";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let currentUserId = null;
let allTransactions = [];
let showAll = false;

function toggleSidebar(){ 
    const s = document.getElementById('sidebar');
    const o = document.getElementById('overlay');
    s.classList.toggle('active');
    o.style.display = s.classList.contains('active') ? 'block' : 'none';
}
function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

async function checkUser(){
    const {data:{user}} = await supabaseClient.auth.getUser();
    if(user){ 
        currentUserId = user.id; 
        refreshData(); 
    } else {
        // Raha tsy misy user dia avereno any amin'ny login pejy
        console.log("Tsy misy olona logué");
    }
}

async function refreshData(){
    // 1. Alaina ny solde
    const {data:u} = await supabaseClient.from('users').select('solde').eq('id', currentUserId).single();
    if(u) document.getElementById('user-solde').innerText = u.solde.toLocaleString() + " Ar";

    // 2. Alaina ny transactions
    const {data:ts} = await supabaseClient.from('transactions')
        .select('*')
        .eq('user_id', currentUserId)
        .order('created_at', {ascending:false});
    
    allTransactions = ts || [];
    renderHistory('all');
}

function renderHistory(filter = 'all'){
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    let filtered = allTransactions;
    if(filter !== 'all') {
        filtered = allTransactions.filter(t => t.service.toLowerCase().includes(filter.toLowerCase()));
    }

    const toDisplay = showAll ? filtered : filtered.slice(0, 3);

    toDisplay.forEach(t => {
        const s = t.service.toLowerCase();
        const isPos = s.includes('recevoir') || s.includes('dépôt');
        const color = t.status === 'Confirmé' ? 'var(--green)' : (t.status === 'Annulé' ? 'var(--red)' : 'var(--yellow)');
        
        list.innerHTML += `
            <div class="trans-item">
                <div class="t-info">
                    <b>${t.service}</b>
                    <small>${new Date(t.created_at).toLocaleString('fr-MG')}</small>
                </div>
                <div class="t-amount">
                    <span style="color:${isPos ? 'var(--green)' : 'var(--red)'}; font-weight:700;">
                        ${isPos?'+':'-'} ${t.montant.toLocaleString()} Ar
                    </span><br>
                    <span class="status-pill" style="background:${color}22; color:${color}">${t.status}</span>
                </div>
            </div>`;
    });
}

function filterHistory(type, btn){
    showAll = false;
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderHistory(type);
}

function showFullHistory(){
    showAll = true;
    renderHistory('all');
    if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
}

function logout(){ supabaseClient.auth.signOut().then(()=>location.reload()); }

// Atomboka ny fisavana user
checkUser();
</script>
</body>
</html>
