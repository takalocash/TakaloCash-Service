<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakaloCash Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-body: #0d1117; --bg-nav: #161b22; --card: #1c2128;
            --yellow: #fcd535; --green: #2ebd85; --red: #ff4d4d; 
            --gray: #848e9c; --border: rgba(255,255,255,0.1);
            --grad-yellow: linear-gradient(135deg, #fcd535, #f7b500);
        }
        body { margin: 0; background: var(--bg-body); font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        header { background: var(--bg-nav); padding: 15px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        
        .container { max-width: 480px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        /* CARDS */
        .solde-card { text-align: center; padding: 30px 20px; background: radial-gradient(circle at top right, #1c2128, #0d1117); border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        .solde-amount { font-size: 32px; font-weight: 800; margin: 8px 0; color: white; }

        /* BUTTONS & SERVICES */
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .btn-action { border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-env { background: var(--grad-yellow); color: black; }
        .btn-rec { background: #2b3139; color: white; border: 1px solid var(--border); }
        
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .service-item { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: #000; flex-shrink: 0; }
        .service-info b { display: block; font-size: 14px; }
        .service-info small { color: var(--gray); font-size: 11px; }

        /* FORM BOX */
        .trans-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .styled-input { background: var(--bg-body); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: white; width: 100%; box-sizing: border-box; outline: none; font-size: 14px; margin-top: 5px; }
        .btn-valider { width: 100%; background: var(--grad-yellow); border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; color: black; margin-top: 15px; font-size: 15px; }

        /* SIDEBAR & OVERLAY */
        .sidebar { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: var(--bg-nav); z-index: 2000; transition: 0.3s; padding: 25px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .history-table td { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

<div id="auth-container" style="position:fixed; inset:0; background:var(--bg-body); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:30px; border-radius:24px; width:100%; max-width:320px; text-align:center; border:1px solid var(--border);">
        <h2 style="color:var(--yellow); margin-bottom:20px;">Connexion</h2>
        <input type="email" id="auth-email" class="styled-input" placeholder="Email">
        <input type="password" id="auth-password" class="styled-input" placeholder="Mot de passe" style="margin-top:10px">
        <button class="btn-valider" onclick="handleLogin()">Se connecter</button>
    </div>
</div>

<header id="nav-header" style="display:none;">
    <div style="max-width:480px; margin:auto; display:flex; justify-content:space-between; align-items:center;">
        <div id="header-left" style="font-weight:900; font-size:20px; cursor:pointer;" onclick="showPage('home')">
            <span style="color:var(--yellow)">TAKALO</span>CASH
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fa-solid fa-bars-staggered" style="font-size:22px; cursor:pointer; color:var(--yellow);" onclick="toggleMenu()"></i>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:30px;">
        <div style="font-weight:bold;">MENU</div>
        <i class="fa-solid fa-xmark" onclick="toggleMenu()" style="font-size:22px; cursor:pointer;"></i>
    </div>
    <div onclick="showPage('history')" style="padding:15px 0; border-bottom:1px solid var(--border); cursor:pointer;"><i class="fa-solid fa-clock-rotate-left"></i> &nbsp; Historique</div>
    <div onclick="openMobile('Dépôt')" style="padding:15px 0; border-bottom:1px solid var(--border); cursor:pointer;"><i class="fa-solid fa-plus-circle" style="color:var(--green)"></i> &nbsp; Dépôt MM</div>
    <div onclick="openMobile('Retrait')" style="padding:15px 0; border-bottom:1px solid var(--border); cursor:pointer;"><i class="fa-solid fa-minus-circle" style="color:var(--red)"></i> &nbsp; Retrait MM</div>
    <div onclick="logout()" style="padding:20px 0; color:var(--red); cursor:pointer; margin-top:20px;"><i class="fa-solid fa-power-off"></i> &nbsp; Déconnexion</div>
</div>

<div class="container" id="main-app" style="display:none;">
    <div id="page-home">
        <div class="solde-card">
            <div style="color:var(--gray); font-size:12px; font-weight:600; text-transform:uppercase;">Solde Disponible</div>
            <h1 class="solde-amount" id="display-solde">0 Ar</h1>
        </div>

        <div class="main-actions">
            <button class="btn-action btn-env" onclick="switchMode('Envoyer')"><i class="fa-solid fa-paper-plane"></i> Envoyer</button>
            <button class="btn-action btn-rec" onclick="switchMode('Recevoir')"><i class="fa-solid fa-qrcode"></i> Recevoir</button>
        </div>

        <div class="services-grid">
            <div class="service-item" onclick="switchMode('Envoyer')"><div class="icon-box" style="color:#f3ba2f;"><i class="fa-solid fa-brands fa-bitcoin"></i></div><div class="service-info"><b>Crypto</b><small>TRX, USDT...</small></div></div>
            <div class="service-item" onclick="switchMode('Envoyer')"><div class="icon-box" style="color:#8132ad;"><i class="fa-solid fa-wallet"></i></div><div class="service-info"><b>Portefeuille</b><small>Skrill, Neteller</small></div></div>
            <div class="service-item" onclick="switchMode('Envoyer')"><div class="icon-box" style="color:#00a3da; background:white; padding:4px;"><img src="https://upload.wikimedia.org/wikipedia/commons/1/14/1xBet_logo.svg" width="24"></div><div class="service-info"><b>1xBet</b><small>Dépôt, Retrait</small></div></div>
            <div class="service-item" onclick="switchMode('Envoyer')"><div class="icon-box" style="color:white;"><i class="fa-solid fa-satellite-dish"></i></div><div class="service-info"><b>Starlink</b><small>Abonnement</small></div></div>
        </div>

        <div class="trans-box">
            <b id="trans-title" style="color:var(--yellow); font-size:16px; display:block; margin-bottom:15px;">Envoyer Crypto</b>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <div>
                    <label style="font-size:11px; color:var(--gray)">Asset :</label>
                    <select id="crypto-select" class="styled-input" onchange="updateCalc()">
                        <option value="TRX">TRX (TRC20)</option>
                        <option value="USDT">USDT (TRC20)</option>
                        <option value="1XBET">1xBet</option>
                    </select>
                </div>
                <div>
                    <label id="label-right" style="font-size:11px; color:var(--gray)">Montant (Ar) :</label>
                    <input type="number" id="input-main" class="styled-input" placeholder="0" oninput="updateCalc()">
                </div>
            </div>
            <label style="font-size:11px; color:var(--gray)">Adresse / ID :</label>
            <input type="text" id="input-addr" class="styled-input" placeholder="Saisir ici">
            
            <div style="margin-top:15px; padding:10px; background:rgba(255,255,255,0.03); border-radius:8px; display:flex; justify-content:space-between; font-size:12px;">
                <span style="color:var(--gray)">Recu estimé :</span>
                <span id="calc-res" style="color:var(--yellow); font-weight:bold;">0.00</span>
            </div>
            <button class="btn-valider" onclick="executeTrans()">Confirmer la transaction</button>
        </div>
        
        <h4 style="color:var(--gray); margin-bottom:10px;">Activités récentes</h4>
        <table class="history-table"><tbody id="history-preview-body"></tbody></table>
    </div>

    <div id="page-history" style="display:none;">
        <h3 style="margin-top:0;">Historique complet</h3>
        <table class="history-table"><tbody id="history-full-body"></tbody></table>
    </div>
</div>

<div id="modal-mobile" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:5000; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:25px; border-radius:20px; width:100%; max-width:320px; border:1px solid var(--border);">
        <h3 id="mob-title" style="color:var(--yellow); margin-top:0;">Dépôt MM</h3>
        <input type="number" id="mob-amount" class="styled-input" placeholder="Montant en Ar">
        <input type="tel" id="mob-phone" class="styled-input" placeholder="Numéro de téléphone" style="margin-top:10px;">
        <button class="btn-valider" onclick="executeMobile()">Valider</button>
        <p onclick="document.getElementById('modal-mobile').style.display='none'" style="text-align:center; cursor:pointer; color:var(--gray); margin-top:15px; font-size:13px;">Annuler</p>
    </div>
</div>

<script>
// SUPABASE CONFIG (Ampiasao ny anao)
const supabaseClient = supabase.createClient("https://nyeopreahmajoisartoz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...");

let currentUserId = null, userSolde = 0, allTransactions = [], currentMode = 'Envoyer';
const TAUX = { "TRX": 150, "USDT": 4600, "1XBET": 1 };

function toggleMenu(){ 
    const s = document.getElementById('sidebar');
    const o = document.getElementById('overlay');
    s.classList.toggle('active');
    o.style.display = s.classList.contains('active') ? 'block' : 'none';
}

async function handleLogin(){
    const e = document.getElementById('auth-email').value;
    const p = document.getElementById('auth-password').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
    if(error) return alert("Fahadisoana amin'ny fidirana!");
    initApp();
}

async function initApp(){
    const { data: { user } } = await supabaseClient.auth.getUser();
    if(user){
        currentUserId = user.id;
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('nav-header').style.display = 'block';
        document.getElementById('main-app').style.display = 'block';
        fetchData();
    }
}

async function fetchData(){
    const { data: u } = await supabaseClient.from('users').select('solde').eq('id', currentUserId).single();
    if(u) { userSolde = u.solde; updateSoldeUI(); }
    
    const { data: ts } = await supabaseClient.from('transactions').select('*').eq('user_id', currentUserId).order('created_at', {ascending: false});
    allTransactions = ts || [];
    renderHistory();
}

function updateSoldeUI() { 
    document.getElementById('display-solde').innerText = userSolde.toLocaleString() + " Ar"; 
}

function switchMode(m) {
    currentMode = m;
    document.getElementById('trans-title').innerText = m + " Crypto";
    document.getElementById('label-right').innerText = m === 'Envoyer' ? "Montant (Ar) :" : "Quantité Crypto :";
    updateCalc();
}

function updateCalc() {
    const cry = document.getElementById('crypto-select').value;
    const val = parseFloat(document.getElementById('input-main').value) || 0;
    const res = currentMode === 'Envoyer' ? (val / TAUX[cry]).toFixed(2) + " " + cry : (val * TAUX[cry]).toLocaleString() + " Ar";
    document.getElementById('calc-res').innerText = res;
}

async function executeTrans(){
    const val = parseFloat(document.getElementById('input-main').value);
    const cry = document.getElementById('crypto-select').value;
    if(!val || val <= 0) return alert("Ampidiro ny montant!");

    const finalAr = currentMode === 'Envoyer' ? val : (val * TAUX[cry]);
    if(currentMode === 'Envoyer' && userSolde < val) return alert("Tsy ampy ny solde!");

    const { error } = await supabaseClient.from('transactions').insert([{
        user_id: currentUserId, montant: finalAr, service: currentMode + " " + cry, status: "En attente", adresse: document.getElementById('input-addr').value
    }]);

    if(!error) { alert("Voaray ny fangatahana! ✅"); fetchData(); }
}

function renderHistory(){
    const bPreview = document.getElementById('history-preview-body');
    const bFull = document.getElementById('history-full-body');
    let html = "";
    allTransactions.forEach(t => {
        html += `<tr><td><b>${t.service}</b><br><small>${new Date(t.created_at).toLocaleDateString()}</small></td><td style="text-align:right"><b>${t.montant.toLocaleString()} Ar</b><br><span style="color:var(--yellow); font-size:10px">${t.status}</span></td></tr>`;
    });
    bFull.innerHTML = html;
    bPreview.innerHTML = html.split('</tr>').slice(0,3).join('</tr>');
}

function showPage(p){
    document.getElementById('page-home').style.display = p === 'home' ? 'block' : 'none';
    document.getElementById('page-history').style.display = p === 'history' ? 'block' : 'none';
    if(p === 'history') toggleMenu();
}

function openMobile(t){ document.getElementById('mob-title').innerText = t + " MM"; document.getElementById('modal-mobile').style.display = 'flex'; toggleMenu(); }

async function executeMobile(){
    const val = parseFloat(document.getElementById('mob-amount').value);
    const phone = document.getElementById('mob-phone').value;
    if(!val || !phone) return alert("Fenoy ny banga!");
    
    await supabaseClient.from('transactions').insert([{
        user_id: currentUserId, montant: val, service: document.getElementById('mob-title').innerText, status: "En attente", adresse: phone
    }]);
    alert("Fangatahana MM voaray! ✅");
    document.getElementById('modal-mobile').style.display = 'none';
    fetchData();
}

function logout(){ supabaseClient.auth.signOut().then(() => location.reload()); }

initApp();
</script>
</body>
</html>
