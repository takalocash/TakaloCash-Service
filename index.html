<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TakaloCash</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
}

.profile img {
  width: 35px;
  border-radius: 50%;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 15px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.send {
  background: linear-gradient(90deg, #facc15, #f59e0b);
  color: black;
}

.receive {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: black;
}

.services {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.box {
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  background: rgba(255,255,255,0.1);
  color: white;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 6px;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.status-ok { color: #22c55e; }
.status-wait { color: orange; }

#adminPanel button {
  background: #f59e0b;
  color: black;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">💰 TakaloCash</div>
    <div class="profile">
      <img src="https://i.pravatar.cc/100">
    </div>
  </div>

  <!-- SOLDE -->
  <div class="card">
    <p>Solde disponible</p>
    <h1 id="solde">0 Ar</h1>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="send">Envoyer</button>
    <button class="receive">Recevoir</button>
  </div>

  <!-- SERVICES -->
  <div class="services">
    <div class="box">💰 Crypto</div>
    <div class="box">👛 Wallet</div>
    <div class="box">🎮 1xBet</div>
    <div class="box">📡 Starlink</div>
  </div>

  <!-- FORM -->
  <div class="card">
    <h3>Envoyer Crypto</h3>

    <label>Montant (Ar)</label>
    <input type="number" id="ariary">

    <label>Equivalent TRX</label>
    <input type="text" id="cryptoValue" readonly>

    <label>Adresse</label>
    <input type="text" id="adresse">

    <button class="send" onclick="envoyer()">Valider</button>
  </div>

  <!-- HISTORIQUE -->
  <div class="card">
    <h3>Historique</h3>
    <table id="table"></table>
  </div>

  <!-- ADMIN PANEL -->
  <div class="card" id="adminPanel" style="display:none;">
    <h3>Admin Panel - Transactions</h3>
    <table id="adminTable"></table>
  </div>

</div>

<script>
// 🔑 SUPABASE CONFIG
const supabase = supabase.createClient(
  "https://nyeopreahmajoisartoz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55ZW9wcmVhaG1ham9pc2FydG96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjgzMDgsImV4cCI6MjA5MDE0NDMwOH0.2ASTgZPKssdhGnFGcjit7BZOdEFOnFqIHkmt8w239EA"
);

// 👤 USER DEMO
const userId = "USER_ID";

// 💱 TAUX
const tauxTRX = 10;

// 🔄 CALCUL AR -> TRX
document.getElementById("ariary").addEventListener("input", function() {
  let ar = this.value;
  document.getElementById("cryptoValue").value = (ar / tauxTRX).toFixed(2) + " TRX";
});

// 📤 ENVOI RETRAIT
async function envoyer() {
  let montant = document.getElementById("ariary").value;
  let adresse = document.getElementById("adresse").value;

  if (!montant || montant <= 0) {
    alert("Ampidiro montant!");
    return;
  }

  await supabase.from("transactions").insert([{
    user_id: userId,
    type: "retrait",
    montant: montant,
    adresse: adresse,
    status: "en_attente"
  }]);

  alert("Demande envoyée ✅");
  loadTransactions();
  if (isAdmin) loadAdminTransactions();
}

// 📊 LOAD HISTORIQUE USER
async function loadTransactions() {
  let { data } = await supabase
    .from("transactions")
    .select("*")
    .eq("user_id", userId)
    .order("created_at", { ascending: false });

  let html = "";
  data.forEach(t => {
    html += `
    <tr>
      <td>${t.type}</td>
      <td>${t.montant} Ar</td>
      <td class="${t.status === 'confirmé' ? 'status-ok' : 'status-wait'}">
        ${t.status}
      </td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// 💰 LOAD SOLDE
async function loadSolde() {
  let { data } = await supabase
    .from("users")
    .select("solde")
    .eq("id", userId)
    .single();

  if (data) document.getElementById("solde").innerText = data.solde + " Ar";
}

// 🔑 ADMIN FLAG
const isAdmin = true; // true raha admin

if (isAdmin) document.getElementById("adminPanel").style.display = "block";

// 📊 LOAD ADMIN TRANSACTIONS
async function loadAdminTransactions() {
  let { data } = await supabase
    .from("transactions")
    .select("*")
    .order("created_at", { ascending: false });

  let html = `<tr>
    <th>User</th><th>Type</th><th>Montant</th><th>Adresse</th><th>Status</th><th>Action</th>
  </tr>`;

  data.forEach(t => {
    html += `
    <tr>
      <td>${t.user_id}</td>
      <td>${t.type}</td>
      <td>${t.montant} Ar</td>
      <td>${t.adresse || '-'}</td>
      <td class="${t.status === 'confirmé' ? 'status-ok' : 'status-wait'}">${t.status}</td>
      <td>
        ${t.status === 'en_attente' ? `<button onclick="validateTransaction('${t.id}')">✔️ Confirmer</button>` : ''}
      </td>
    </tr>`;
  });

  document.getElementById("adminTable").innerHTML = html;
}

// ✅ VALIDATION
async function validateTransaction(id) {
  await supabase.from("transactions").update({ status: "confirmé" }).eq("id", id);
  alert("Transaction validée ✅");
  loadTransactions();
  loadAdminTransactions();
}

// 🔄 AUTO REFRESH
setInterval(() => {
  loadTransactions();
  loadSolde();
  if (isAdmin) loadAdminTransactions();
}, 4000);

// 🚀 INIT
loadTransactions();
loadSolde();
if (isAdmin) loadAdminTransactions();
</script>

</body>
</html>
